<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vibe — Social</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg:#0d0d0f; --surface:#17171b; --card:#1e1e24; --border:#2a2a33;
    --accent:#e8ff47; --accent2:#47c9ff; --text:#f0f0f0; --muted:#777;
    --danger:#ff5c5c; --radius:14px; --font-h:'Syne',sans-serif; --font-b:'DM Sans',sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:15px;min-height:100vh}
  input,textarea,button{font-family:var(--font-b)} button{cursor:pointer;border:none}
  .hidden{display:none!important}

  /* AUTH */
  #auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden}
  #auth-page::before,#auth-page::after{content:'';position:absolute;border-radius:50%;filter:blur(80px);opacity:.18;pointer-events:none}
  #auth-page::before{width:420px;height:420px;background:var(--accent);top:-120px;left:-120px}
  #auth-page::after{width:340px;height:340px;background:var(--accent2);bottom:-100px;right:-80px}
  .auth-box{background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:40px 36px;width:100%;max-width:420px;position:relative;z-index:1;animation:fadeUp .45s ease both}
  .auth-logo{font-family:var(--font-h);font-size:2.4rem;font-weight:800;letter-spacing:-1px;color:var(--accent);margin-bottom:4px}
  .auth-tagline{color:var(--muted);font-size:13px;margin-bottom:32px;font-weight:300}
  .auth-tabs{display:flex;gap:4px;background:var(--card);border-radius:10px;padding:4px;margin-bottom:28px}
  .auth-tab{flex:1;padding:9px;border-radius:7px;background:transparent;color:var(--muted);font-family:var(--font-h);font-size:13px;font-weight:600;transition:all .2s}
  .auth-tab.active{background:var(--accent);color:#000}
  .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
  .field label{font-size:12px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
  .field input{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:11px 14px;color:var(--text);font-size:14px;transition:border-color .2s;outline:none}
  .field input:focus{border-color:var(--accent)}
  .btn-primary{width:100%;padding:13px;border-radius:10px;background:var(--accent);color:#000;font-family:var(--font-h);font-weight:700;font-size:14px;margin-top:8px;transition:opacity .15s,transform .15s}
  .btn-primary:hover{opacity:.88;transform:translateY(-1px)}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
  .auth-msg{margin-top:14px;font-size:13px;text-align:center;min-height:18px}
  .auth-msg.err{color:var(--danger)} .auth-msg.ok{color:var(--accent)}

  /* APP */
  #app-page{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding-bottom:80px}
  .topnav{width:100%;max-width:680px;display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;position:sticky;top:0;background:rgba(13,13,15,.85);backdrop-filter:blur(14px);z-index:10;border-bottom:1px solid var(--border)}
  .nav-logo{font-family:var(--font-h);font-weight:800;font-size:1.4rem;color:var(--accent);letter-spacing:-0.5px}
  .nav-user{display:flex;align-items:center;gap:10px}
  .nav-avatar{width:34px;height:34px;border-radius:50%;font-family:var(--font-h);font-weight:700;font-size:14px;display:flex;align-items:center;justify-content:center}
  .nav-name{font-size:13px;font-weight:500}
  .btn-logout{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:8px;font-size:12px;transition:all .2s}
  .btn-logout:hover{color:var(--danger);border-color:var(--danger)}
  .feed-wrap{width:100%;max-width:680px;padding:20px 20px 0;display:flex;flex-direction:column}
  .compose{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:22px;animation:fadeUp .35s ease both}
  .compose-top{display:flex;gap:12px;align-items:flex-start}
  .compose-avatar{width:38px;height:38px;border-radius:50%;font-family:var(--font-h);font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .compose textarea{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:15px;font-family:var(--font-b);font-weight:300;resize:none;line-height:1.6;min-height:64px}
  .compose textarea::placeholder{color:var(--muted)}
  .compose-footer{display:flex;justify-content:flex-end;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
  .btn-post{background:var(--accent);color:#000;font-family:var(--font-h);font-weight:700;font-size:13px;padding:9px 22px;border-radius:8px;transition:opacity .15s,transform .15s}
  .btn-post:hover{opacity:.85;transform:translateY(-1px)}
  .btn-post:disabled{opacity:.5;cursor:not-allowed;transform:none}
  .feed-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px}
  .feed-tab{flex:1;padding:12px;background:transparent;color:var(--muted);font-family:var(--font-h);font-size:13px;font-weight:600;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.02em}
  .feed-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .post-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;animation:fadeUp .3s ease both;transition:border-color .2s}
  .post-card:hover{border-color:#3a3a45}
  .post-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .post-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-h);font-weight:700;font-size:14px;flex-shrink:0}
  .post-meta{flex:1}
  .post-name{font-family:var(--font-h);font-weight:700;font-size:14px}
  .post-time{font-size:11px;color:var(--muted);margin-top:1px}
  .post-body{font-size:15px;line-height:1.65;font-weight:300;white-space:pre-wrap;word-break:break-word}
  .post-actions{display:flex;gap:6px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
  .btn-action{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:8px;font-size:12px;transition:all .2s}
  .btn-action:hover{color:var(--text);border-color:#444}
  .btn-action.liked{color:var(--danger);border-color:var(--danger);background:rgba(255,92,92,.07)}
  .btn-delete{margin-left:auto;background:transparent;border:1px solid transparent;color:var(--muted);padding:7px 10px;border-radius:8px;font-size:12px;transition:all .2s}
  .btn-delete:hover{color:var(--danger);border-color:var(--danger)}
  .profile-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px;margin-bottom:22px;display:flex;gap:20px;align-items:center;animation:fadeUp .35s ease both}
  .profile-big-avatar{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-h);font-weight:800;font-size:26px;flex-shrink:0}
  .profile-info{flex:1}
  .profile-name{font-family:var(--font-h);font-size:1.3rem;font-weight:800}
  .profile-detail{font-size:13px;color:var(--muted);margin-top:3px;font-weight:300}
  .profile-stats{display:flex;gap:20px;margin-top:14px}
  .stat{text-align:center}
  .stat-num{font-family:var(--font-h);font-weight:700;font-size:1.1rem;color:var(--accent)}
  .stat-label{font-size:11px;color:var(--muted)}
  .empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px;font-weight:300;border:1px dashed var(--border);border-radius:var(--radius)}
  .empty-icon{font-size:2rem;margin-bottom:10px}
  .spinner{text-align:center;padding:40px;color:var(--muted);font-size:13px}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- AUTH PAGE -->
<div id="auth-page">
  <div class="auth-box">
    <div class="auth-logo">Vibe</div>
    <div class="auth-tagline">Your tiny corner of the internet.</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Log In</button>
      <button class="auth-tab" onclick="switchTab('register')">Register</button>
    </div>
    <div id="login-form">
      <div class="field"><label>Name</label><input type="text" id="login-name" placeholder="Your name" /></div>
      <div class="field"><label>Password</label><input type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()" /></div>
      <button class="btn-primary" id="btn-login" onclick="doLogin()">Log In</button>
    </div>
    <div id="register-form" class="hidden">
      <div class="field"><label>Name</label><input type="text" id="reg-name" placeholder="Choose a name" /></div>
      <div class="field"><label>Password</label><input type="password" id="reg-pass" placeholder="Choose a password" /></div>
      <div class="field"><label>Email</label><input type="email" id="reg-email" placeholder="you@example.com" /></div>
      <div class="field"><label>Age</label><input type="number" id="reg-age" placeholder="Your age" min="1" max="120" onkeydown="if(event.key==='Enter')doRegister()" /></div>
      <button class="btn-primary" id="btn-register" onclick="doRegister()">Create Account</button>
    </div>
    <div id="auth-msg" class="auth-msg"></div>
  </div>
</div>

<!-- APP PAGE -->
<div id="app-page" class="hidden">
  <nav class="topnav">
    <div class="nav-logo">Vibe</div>
    <div class="nav-user">
      <div class="nav-avatar" id="nav-avatar">?</div>
      <span class="nav-name" id="nav-name"></span>
      <button class="btn-logout" onclick="doLogout()">Log out</button>
    </div>
  </nav>
  <div class="feed-wrap">
    <div class="compose">
      <div class="compose-top">
        <div class="compose-avatar" id="compose-avatar">?</div>
        <textarea id="post-text" placeholder="What's on your mind?" rows="3"></textarea>
      </div>
      <div class="compose-footer">
        <button class="btn-post" id="btn-post" onclick="submitPost()">Post</button>
      </div>
    </div>
    <div class="feed-tabs">
      <button class="feed-tab active" onclick="switchFeedTab('all')"     id="tab-all">All Posts</button>
      <button class="feed-tab"        onclick="switchFeedTab('mine')"    id="tab-mine">My Posts</button>
      <button class="feed-tab"        onclick="switchFeedTab('profile')" id="tab-profile">Profile</button>
    </div>
    <div id="feed-area"><div class="spinner">Loading…</div></div>
  </div>
</div>

<script>
// ── SUPABASE ───────────────────────────────────────────────────
const SUPABASE_URL = 'https://dwuxkuyxeqyblohbqlfv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR3dXhrdXl4ZXF5YmxvaGJxbGZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxODU2MjgsImV4cCI6MjA5Mjc2MTYyOH0.BljSgpJGk-KdRKsWrJVjoM9FuyLX2cm6gjBkqlmLXag';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── STATE ──────────────────────────────────────────────────────
let currentUser = null;
let activeFeedTab = 'all';

// ── AVATAR ────────────────────────────────────────────────────
const COLORS = ['#e8ff47','#47c9ff','#ff7eb3','#7effb2','#ffb347','#c47fff','#ff6b6b','#4df0e0','#ffd966','#80caff'];
function avatarColor(name) { let h=0; for(let c of name) h=(h*31+c.charCodeAt(0))&0xffff; return COLORS[h%COLORS.length]; }
function avatarText(name)  { return name.trim()[0].toUpperCase(); }
function avatarStyle(name) {
  const bg=avatarColor(name), r=parseInt(bg.slice(1,3),16), g=parseInt(bg.slice(3,5),16), b=parseInt(bg.slice(5,7),16);
  return `background:${bg};color:${(r*299+g*587+b*114)/1000>128?'#000':'#fff'}`;
}

// ── TIME ───────────────────────────────────────────────────────
function timeAgo(ts) {
  const m=Math.floor((Date.now()-ts)/60000);
  if(m<1) return 'just now'; if(m<60) return `${m}m ago`;
  const h=Math.floor(m/60); if(h<24) return `${h}h ago`;
  return `${Math.floor(h/24)}d ago`;
}

// ── ESCAPE ────────────────────────────────────────────────────
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── AUTH UI ───────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('login-form').classList.toggle('hidden', tab!=='login');
  document.getElementById('register-form').classList.toggle('hidden', tab!=='register');
  document.querySelectorAll('.auth-tab').forEach((el,i) => el.classList.toggle('active',(i===0&&tab==='login')||(i===1&&tab==='register')));
  setAuthMsg('','');
}
function setAuthMsg(text, type){ const el=document.getElementById('auth-msg'); el.textContent=text; el.className='auth-msg '+type; }
function setBusy(id, busy, label){ const b=document.getElementById(id); b.disabled=busy; b.textContent=busy?'Please wait…':label; }

// ── REGISTER ──────────────────────────────────────────────────
async function doRegister() {
  const name=document.getElementById('reg-name').value.trim();
  const pass=document.getElementById('reg-pass').value;
  const email=document.getElementById('reg-email').value.trim();
  const age=document.getElementById('reg-age').value.trim();
  if(!name||!pass||!email||!age){ setAuthMsg('Please fill in all fields.','err'); return; }
  if(pass.length<4){ setAuthMsg('Password must be at least 4 characters.','err'); return; }
  setBusy('btn-register',true,'Create Account');

  const {data:existing} = await sb.from('users').select('id').ilike('name',name).maybeSingle();
  if(existing){ setAuthMsg('That name is already taken.','err'); setBusy('btn-register',false,'Create Account'); return; }

  const {data,error} = await sb.from('users').insert({name,password:pass,email,age,joined_at:Date.now()}).select().single();
  if(error){ setAuthMsg('Error: '+error.message,'err'); setBusy('btn-register',false,'Create Account'); return; }

  setAuthMsg('Account created! Logging you in…','ok');
  setTimeout(()=>openApp(data), 900);
}

// ── LOGIN ─────────────────────────────────────────────────────
async function doLogin() {
  const name=document.getElementById('login-name').value.trim();
  const pass=document.getElementById('login-pass').value;
  if(!name||!pass){ setAuthMsg('Please fill in all fields.','err'); return; }
  setBusy('btn-login',true,'Log In');

  const {data,error} = await sb.from('users').select('*').ilike('name',name).eq('password',pass).maybeSingle();
  setBusy('btn-login',false,'Log In');
  if(error||!data){ setAuthMsg('Wrong name or password.','err'); return; }
  openApp(data);
}

// ── LOGOUT ────────────────────────────────────────────────────
function doLogout(){
  currentUser=null;
  document.getElementById('app-page').classList.add('hidden');
  document.getElementById('auth-page').classList.remove('hidden');
  ['login-name','login-pass','reg-name','reg-pass','reg-email','reg-age'].forEach(id=>document.getElementById(id).value='');
  setAuthMsg('',''); switchTab('login');
}

// ── OPEN APP ──────────────────────────────────────────────────
function openApp(user){
  currentUser=user;
  document.getElementById('auth-page').classList.add('hidden');
  document.getElementById('app-page').classList.remove('hidden');
  document.getElementById('nav-name').textContent=user.name;
  document.getElementById('nav-avatar').textContent=avatarText(user.name);
  document.getElementById('nav-avatar').style.cssText=avatarStyle(user.name);
  document.getElementById('compose-avatar').textContent=avatarText(user.name);
  document.getElementById('compose-avatar').style.cssText=avatarStyle(user.name);
  switchFeedTab('all');
}

// ── FEED TABS ─────────────────────────────────────────────────
function switchFeedTab(tab){
  activeFeedTab=tab;
  ['all','mine','profile'].forEach(t=>document.getElementById('tab-'+t).classList.toggle('active',t===tab));
  renderFeed();
}

// ── POST ──────────────────────────────────────────────────────
async function submitPost(){
  const text=document.getElementById('post-text').value.trim();
  if(!text) return;
  const btn=document.getElementById('btn-post');
  btn.disabled=true; btn.textContent='…';
  const {error}=await sb.from('posts').insert({author:currentUser.name,body:text,ts:Date.now(),likes:[]});
  btn.disabled=false; btn.textContent='Post';
  if(error){ alert('Could not post: '+error.message); return; }
  document.getElementById('post-text').value='';
  renderFeed();
}

// ── LIKE ──────────────────────────────────────────────────────
async function toggleLike(postId, currentLikes){
  const idx=currentLikes.indexOf(currentUser.name);
  const newLikes=idx===-1?[...currentLikes,currentUser.name]:currentLikes.filter(n=>n!==currentUser.name);
  await sb.from('posts').update({likes:newLikes}).eq('id',postId);
  renderFeed();
}

// ── DELETE ────────────────────────────────────────────────────
async function deletePost(postId){
  await sb.from('posts').delete().eq('id',postId);
  renderFeed();
}

// ── RENDER FEED ───────────────────────────────────────────────
async function renderFeed(){
  const area=document.getElementById('feed-area');
  area.innerHTML='<div class="spinner">Loading…</div>';

  if(activeFeedTab==='profile'){ await renderProfile(area); return; }

  let query=sb.from('posts').select('*').order('ts',{ascending:false});
  if(activeFeedTab==='mine') query=query.ilike('author',currentUser.name);

  const {data:posts,error}=await query;
  if(error){ area.innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div>${error.message}</div>`; return; }
  if(!posts||posts.length===0){
    area.innerHTML=`<div class="empty"><div class="empty-icon">${activeFeedTab==='mine'?'✏️':'🌐'}</div>${activeFeedTab==='mine'?"You haven't posted anything yet.":"No posts yet — be the first!"}</div>`; return;
  }

  area.innerHTML=posts.map(post=>{
    const isMe=post.author.toLowerCase()===currentUser.name.toLowerCase();
    const liked=(post.likes||[]).includes(currentUser.name);
    return `<div class="post-card">
      <div class="post-header">
        <div class="post-avatar" style="${avatarStyle(post.author)}">${avatarText(post.author)}</div>
        <div class="post-meta">
          <div class="post-name">${esc(post.author)}</div>
          <div class="post-time">${timeAgo(post.ts)}</div>
        </div>
      </div>
      <div class="post-body">${esc(post.body)}</div>
      <div class="post-actions">
        <button class="btn-action ${liked?'liked':''}" onclick="toggleLike(${post.id},${JSON.stringify(post.likes||[])})">
          ${liked?'❤️':'🤍'} ${(post.likes||[]).length}
        </button>
        ${isMe?`<button class="btn-delete" onclick="deletePost(${post.id})">🗑 Delete</button>`:''}
      </div>
    </div>`;
  }).join('');
}

// ── RENDER PROFILE ────────────────────────────────────────────
async function renderProfile(area){
  const {data:posts}=await sb.from('posts').select('*').ilike('author',currentUser.name).order('ts',{ascending:false});
  const myPosts=posts||[];
  const totalLikes=myPosts.reduce((s,p)=>s+(p.likes||[]).length,0);
  const joined=new Date(currentUser.joined_at).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});

  area.innerHTML=`
  <div class="profile-card">
    <div class="profile-big-avatar" style="${avatarStyle(currentUser.name)}">${avatarText(currentUser.name)}</div>
    <div class="profile-info">
      <div class="profile-name">${esc(currentUser.name)}</div>
      <div class="profile-detail">${esc(currentUser.email)} · Age ${esc(currentUser.age)}</div>
      <div class="profile-detail" style="margin-top:4px">Joined ${joined}</div>
      <div class="profile-stats">
        <div class="stat"><div class="stat-num">${myPosts.length}</div><div class="stat-label">Posts</div></div>
        <div class="stat"><div class="stat-num">${totalLikes}</div><div class="stat-label">Likes</div></div>
      </div>
    </div>
  </div>
  <div style="font-family:var(--font-h);font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;">Your Posts</div>
  ${myPosts.length===0
    ?`<div class="empty"><div class="empty-icon">✏️</div>You haven't posted anything yet.</div>`
    :myPosts.map(post=>{
      const liked=(post.likes||[]).includes(currentUser.name);
      return `<div class="post-card">
        <div class="post-body">${esc(post.body)}</div>
        <div class="post-actions" style="margin-top:10px">
          <button class="btn-action ${liked?'liked':''}" onclick="toggleLike(${post.id},${JSON.stringify(post.likes||[])}).then(()=>switchFeedTab('profile'))">
            ${liked?'❤️':'🤍'} ${(post.likes||[]).length}
          </button>
          <button class="btn-delete" onclick="deletePost(${post.id}).then(()=>switchFeedTab('profile'))">🗑 Delete</button>
          <span style="margin-left:auto;font-size:11px;color:var(--muted);align-self:center">${timeAgo(post.ts)}</span>
        </div>
      </div>`;
    }).join('')
  }`;
}
</script>
</body>
</html>
